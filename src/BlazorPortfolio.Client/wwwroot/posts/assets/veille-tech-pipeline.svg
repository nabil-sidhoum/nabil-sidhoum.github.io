<svg xmlns="http://www.w3.org/2000/svg" width="760" height="700" viewBox="0 0 760 700" role="img" aria-labelledby="t d">
  <title id="t">Architecture du pipeline veille-tech</title>
  <desc id="d">Pipeline .NET 10 stateless déclenché par 3 crons GitHub Actions hebdomadaires (un profil par jour). Étapes : ProfileLoader (YAML), FeedCollector (RSS/Atom avec fallback et auto-découverte), Deduplicator (filtre les articles déjà vus), ArticleScorer (scoring 1 à 5 via LLM, séquentiel et throttlé), Deduplicator (marquage et purge), ReportAssembler (assemblage Markdown 100 % local), ReportSaver (archivage), Publisher (un message Discord par article retenu). Nœuds externes : profils YAML, API LLM (scoring et résumé), SQLite embarquée, canal de diffusion.</desc>
  <defs>
    <marker id="arrFlow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrEnd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrStart" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M7,0 L0,3 L7,6 Z" fill="#6b7280"/>
    </marker>
    <style>
      text   { font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif; }
      .id    { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; fill: #e8edf3; font-weight: 600; font-size: 13px; }
      .sub   { fill: #9aa4b2; font-size: 11px; font-style: italic; }
      .ionode{ fill: #e8edf3; font-weight: 600; font-size: 12px; }
      .iosub { fill: #9aa4b2; font-size: 10.5px; font-style: italic; }
      .frame { fill: #6b7280; font-size: 12px; font-weight: 600; }
      .trig  { fill: #ffffff; font-size: 11.5px; font-weight: 600; }
      .box   { fill: #1b2230; stroke: #3b82f6; stroke-width: 1.3; }
      .ext   { fill: #161b22; stroke: #6b7280; stroke-width: 1.2; }
    </style>
  </defs>

  <!-- pipeline subgraph frame (transparent) -->
  <rect x="40" y="84" width="340" height="594" rx="10" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="4 4"/>
  <text class="frame" x="210" y="104" text-anchor="middle">Pipeline .NET 10 · console app stateless</text>

  <!-- trigger -->
  <rect x="65" y="22" width="290" height="46" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text class="trig" x="210" y="50" text-anchor="middle">GitHub Actions · 3 crons hebdo · 1 profil/jour</text>

  <!-- flow arrows (main path) -->
  <g stroke="#3b82f6" stroke-width="2" marker-end="url(#arrFlow)" fill="none">
    <line x1="210" y1="68"  x2="210" y2="118"/>
    <line x1="210" y1="172" x2="210" y2="188"/>
    <line x1="210" y1="242" x2="210" y2="258"/>
    <line x1="210" y1="312" x2="210" y2="328"/>
    <line x1="210" y1="382" x2="210" y2="398"/>
    <line x1="210" y1="452" x2="210" y2="468"/>
    <line x1="210" y1="522" x2="210" y2="538"/>
    <line x1="210" y1="592" x2="210" y2="608"/>
  </g>

  <!-- step boxes -->
  <g>
    <rect class="box" x="60" y="120" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="142" text-anchor="middle">ProfileLoader</text>
    <text class="sub" x="210" y="160" text-anchor="middle">chargement du profil YAML</text>

    <rect class="box" x="60" y="190" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="212" text-anchor="middle">FeedCollector</text>
    <text class="sub" x="210" y="230" text-anchor="middle">RSS/Atom · fallback · auto-découverte</text>

    <rect class="box" x="60" y="260" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="282" text-anchor="middle">Deduplicator</text>
    <text class="sub" x="210" y="300" text-anchor="middle">filtre les articles déjà vus</text>

    <rect class="box" x="60" y="330" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="352" text-anchor="middle">ArticleScorer</text>
    <text class="sub" x="210" y="370" text-anchor="middle">scoring 1→5 via LLM · séquentiel + throttle</text>

    <rect class="box" x="60" y="400" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="422" text-anchor="middle">Deduplicator</text>
    <text class="sub" x="210" y="440" text-anchor="middle">marquage + purge</text>

    <rect class="box" x="60" y="470" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="492" text-anchor="middle">ReportAssembler</text>
    <text class="sub" x="210" y="510" text-anchor="middle">assemblage Markdown · 100% local</text>

    <rect class="box" x="60" y="540" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="562" text-anchor="middle">ReportSaver</text>
    <text class="sub" x="210" y="580" text-anchor="middle">archivage du rapport</text>

    <rect class="box" x="60" y="610" width="300" height="52" rx="8"/>
    <text class="id"  x="210" y="632" text-anchor="middle">Publisher</text>
    <text class="sub" x="210" y="650" text-anchor="middle">1 message / article retenu</text>
  </g>

  <!-- I/O connectors (dashed) -->
  <g stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5 4" fill="none">
    <line x1="470" y1="143" x2="362" y2="146" marker-end="url(#arrEnd)"/>
    <line x1="470" y1="353" x2="362" y2="356" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <line x1="470" y1="423" x2="362" y2="426" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <line x1="478" y1="415" x2="362" y2="288" marker-start="url(#arrStart)" marker-end="url(#arrEnd)"/>
    <line x1="362" y1="636" x2="470" y2="633" marker-end="url(#arrEnd)"/>
  </g>

  <!-- I/O nodes -->
  <g>
    <rect class="ext" x="470" y="120" width="250" height="46" rx="8"/>
    <text class="ionode" x="595" y="139" text-anchor="middle">Profils YAML</text>
    <text class="iosub"  x="595" y="156" text-anchor="middle">1 fichier / thématique</text>

    <rect class="ext" x="470" y="330" width="250" height="46" rx="8"/>
    <text class="ionode" x="595" y="349" text-anchor="middle">API LLM</text>
    <text class="iosub"  x="595" y="366" text-anchor="middle">scoring + résumé</text>

    <rect class="ext" x="470" y="400" width="250" height="46" rx="8"/>
    <text class="ionode" x="595" y="419" text-anchor="middle">SQLite embarquée</text>
    <text class="iosub"  x="595" y="436" text-anchor="middle">articles vus</text>

    <rect class="ext" x="470" y="610" width="250" height="46" rx="8"/>
    <text class="ionode" x="595" y="629" text-anchor="middle">Canal de diffusion</text>
    <text class="iosub"  x="595" y="646" text-anchor="middle">1 message / article</text>
  </g>
</svg>
