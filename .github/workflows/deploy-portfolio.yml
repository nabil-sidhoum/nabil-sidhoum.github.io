name: deploy-portfolio

# Se déclenche uniquement après une exécution réussie de la CI sur main.
# Le découplage CI -> deploy garantit qu'on ne publie que du code vérifié.
on:
  workflow_run:
    workflows: [ "ci-portfolio" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write   # requis pour pousser sur la branche gh-pages

    steps:
      # 1. Récupérer le code source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installer le SDK .NET (version pilotée par src/global.json)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      # 3. Compiler et publier Blazor WebAssembly
      - name: Publish Blazor
        run: dotnet publish src/BlazorPortfolio.Client/BlazorPortfolio.Client.csproj -c Release -o build

      # 4. Forcer le base href pour GitHub Pages
      # Repo principal nabil-sidhoum.github.io => base href = /
      - name: Update base href
        run: sed -i 's#<base href="[^"]*" />#<base href="/" />#' build/wwwroot/index.html

      # 5. Fallback 404 pour le routing SPA Blazor
      - name: Create 404.html for SPA fallback
        run: cp build/wwwroot/index.html build/wwwroot/404.html

      # 6. Déployer vers GitHub Pages (branche gh-pages)
      # peaceiris crée automatiquement .nojekyll (indispensable pour _framework/)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/wwwroot
          publish_branch: gh-pages
