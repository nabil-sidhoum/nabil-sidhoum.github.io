<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 545" role="img" aria-labelledby="title desc" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
  <title id="title">Pipeline veille-tech</title>
  <desc id="desc">Flux vertical : 3 crons GitHub Actions (1 profil par jour), collecte RSS (~19 sources avec fallback et auto-découverte), déduplication SQLite via EF Core, scoring par article via LLM Groq, assemblage Markdown 100 % local sans LLM, puis publication Discord (1 message par article retenu).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <style>
      .box  { fill: #1b2230; stroke: #3b82f6; stroke-width: 1.5; }
      .lbl  { fill: #e8edf3; font-size: 13px; }
      .flow { stroke: #3b82f6; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="box" x="30" y="15"  width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="40"  text-anchor="middle" dominant-baseline="middle">GitHub Actions — 3 crons hebdo, 1 profil/jour</text>

  <line class="flow" x1="300" y1="65"  x2="300" y2="103" marker-end="url(#arrow)"/>

  <rect class="box" x="30" y="105" width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="130" text-anchor="middle" dominant-baseline="middle">Collecte RSS — ~19 sources + fallback + auto-découverte</text>

  <line class="flow" x1="300" y1="155" x2="300" y2="193" marker-end="url(#arrow)"/>

  <rect class="box" x="30" y="195" width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="220" text-anchor="middle" dominant-baseline="middle">Déduplication — SQLite via EF Core</text>

  <line class="flow" x1="300" y1="245" x2="300" y2="283" marker-end="url(#arrow)"/>

  <rect class="box" x="30" y="285" width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="310" text-anchor="middle" dominant-baseline="middle">Scoring par article — LLM (Groq)</text>

  <line class="flow" x1="300" y1="335" x2="300" y2="373" marker-end="url(#arrow)"/>

  <rect class="box" x="30" y="375" width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="400" text-anchor="middle" dominant-baseline="middle">Assemblage Markdown — 100 % local, sans LLM</text>

  <line class="flow" x1="300" y1="425" x2="300" y2="463" marker-end="url(#arrow)"/>

  <rect class="box" x="30" y="465" width="540" height="50" rx="8"/>
  <text class="lbl" x="300" y="490" text-anchor="middle" dominant-baseline="middle">Publication Discord — 1 message par article retenu</text>
</svg>
